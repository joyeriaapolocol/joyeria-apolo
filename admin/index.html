<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CMS</title>
</head>
<body>

<!-- 🔥 ESTE SCRIPT ES EL QUE ARREGLA TODO -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });

    // 👇 ESTO CAPTURA EL TOKEN DEL EMAIL
    window.netlifyIdentity.on("open", () => console.log("Widget abierto"));
    window.netlifyIdentity.on("login", () => console.log("Logueado"));
    window.netlifyIdentity.on("signup", () => console.log("Signup"));
  }
</script>

<div id="nc-root"></div>

<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

</body>
</html>
